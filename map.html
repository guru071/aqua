<!DOCTYPE html>
<html>

<head>
    <title>Smart Aqua Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        #map {
            height: 100vh;
        }

        #topcont {
            position: relative;
        }

        .btn {
            top: 10px;
            left: 100px;
            width: 100px;
            background-color: rgba(225, 225, 255, 0.35);
            color: black;
            padding: 8px 12px;
            border-color: rgb(82, 72, 72);
            border-radius: 15px;
            cursor: pointer;
            position: absolute;
            z-index: 1000;
        }

        #safe {
            left: 320px;
        }

        #moderate {
            left: 430px;
        }

        #unsafe {
            left: 540px;
        }

        #all {
            left: 210px;
            background-color: rgba(31, 199, 31, 0.35);
        }

        .btn:hover {
            box-shadow: 0 0 10px rgb(150, 143, 143),
                0 0 10px rgb(150, 143, 143),
                0 0 10px rgb(150, 143, 143),
                0 0 10px rgb(150, 143, 143);
        }

        @media (max-width: 600px) {
            .btn {
                position: static !important;

                width: 100px !important;
                min-width: 100px !important;
                flex-shrink: 0 !important;

                max-width: none !important;

                padding: 12px 10px !important;

                margin: 5px;
                text-align: center;
            }

            #topcont {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>

<body>

    <div id="topcont">
        <div id="map"></div>
        <button class="btn" id="find">find near by</button>
        <button class="btn" id="all">All</button>
        <button class="btn" id="safe">Safe</button>
        <button class="btn" id="moderate">Moderate</button>
        <button class="btn" id="unsafe">Unsafe</button>
    </div>
    <div id="details">
        <h3>Water Details</h3>

    </div>

    <script>

        const navigationType = performance.getEntriesByType("navigation")[0]?.type;

        if (navigationType === 'reload') {
            sessionStorage.clear("homeload");
            window.location.href = "home.html";
        }

        if (sessionStorage.getItem("homeload") == "true") {
            var userPlace = [];
            var userLat = "";
            var userLng = "";
            let tankMarker = [];
            let nearby = [];
            function getLocation() {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(showSuccess, showError);
                } else {
                    alert("Geolocation is not supported by this browser.");
                }
            }

            function showSuccess(position) {
                userLat = position.coords.latitude;
                userLng = position.coords.longitude;
                L.circleMarker([userLat, userLng], {
                    radius: 8,
                    color: "blue",
                    fillColor: "#00f",
                    fillOpacity: 0.8
                }).addTo(map).bindPopup("📍 You are here").openPopup();
                btnAll();
            }

            function showError(error) {
                switch (error.code) {
                    case error.PERMISSION_DENIED:
                        alert("User denied the request for Geolocation.");
                        break;
                    case error.POSITION_UNAVAILABLE:
                        alert("Location information is unavailable.");
                        break;
                    case error.TIMEOUT:
                        alert("The request to get user location timed out.");
                        break;
                    default:
                        alert("An unknown error occurred.");
                        break;
                }
                btnAll();
            }

            getLocation();

            function processLocation() {
                if (!userLat) {
                    alert("Location not ready!");
                    return;
                }
                let nearest = null;
                let minDist = Infinity;
                nearby.forEach(marker => {
                    let pos = marker.getLatLng();
                    let d = distance(userLat, userLng, pos.lat, pos.lng);

                    if (d < minDist) {
                        minDist = d;
                        nearest = marker;

                    }
                });

                if (nearest) {
                    map.setView(nearest.getLatLng(), 17);
                    alert(`Distance:${minDist}KM`);
                    nearest.openPopup();
                } else {
                    alert("No Water Found ");
                }
            }


            async function getPlace(lat, lng) {
                let res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                let data = await res.json();

                let address = data.address;

                let country = address.country || "Unknown";
                let state = address.state || "Unknown";
                let district = address.state_district || address.county || "Unknown";
                let taluk = address.suburb || address.town || address.village || "Unknown";


                userPlace = [taluk, district, state, country];
            }
            function predict(ph, tds, turbidity) {
                if (ph >= 6.5 && ph <= 8.5 && tds < 300 && turbidity < 5)
                    return "Safe";
                else if (tds < 600)
                    return "Moderate";
                else
                    return "Unsafe";
            }

            function getIcon(status) {
                let color = "blue";

                if (status === "Safe") color = "green";
                else if (status === "Moderate") color = "yellow";
                else if (status === "Unsafe") color = "red";

                return new L.Icon({
                    iconUrl: ` https://maps.google.com/mapfiles/ms/icons/${color}-dot.png`,
                    iconSize: [32, 32]
                });
            }

            function distance(lat1, lon1, lat2, lon2) {
                let R = 6371; // km
                let dLat = (lat2 - lat1) * Math.PI / 180;
                let dLon = (lon2 - lon1) * Math.PI / 180;

                let a =
                    Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                    Math.cos(lat1 * Math.PI / 180) *
                    Math.cos(lat2 * Math.PI / 180) *
                    Math.sin(dLon / 2) * Math.sin(dLon / 2);

                let c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                return R * c;
            }


            var map = L.map('map').setView([13.0827, 80.2707], 11);
            map.setMaxBounds([
                [-90, -180],
                [90, 180]
            ]);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {}).addTo(map);


            tank = {
                "Asia": {
                    "India": {
                        "Tamil Nadu": {
                            "Chennai": {

                            },
                            "Coimbatore": {

                            },
                            "Villupuram": [
                                { name: "Anna Nagar", lat: 13.0850, lng: 80.2101, ph: 6, tds: 200, turbidity: 2 },
                                { name: "T Nagar", lat: 13.0418, lng: 80.2341, ph: 11, tds: 200, turbidity: 2 },
                                { name: "Velachery", lat: 12.9750, lng: 80.2209, ph: 7, tds: 200, turbidity: 2 },
                                { name: "Tambaram", lat: 12.9249, lng: 80.1000, ph: 7, tds: 200, turbidity: 2 },
                                { name: "Guindy", lat: 13.0100, lng: 80.2200, ph: 7, tds: 200, turbidity: 2 },
                                { name: "Adyar", lat: 13.0067, lng: 80.2570, ph: 7, tds: 200, turbidity: 2 },
                                { name: "Porur", lat: 13.0350, lng: 80.1600, ph: 7, tds: 200, turbidity: 2 },
                                { name: "Ambattur", lat: 13.1143, lng: 80.1548, ph: 7, tds: 200, turbidity: 2 },
                                { name: "Perambur", lat: 13.1180, lng: 80.2320, ph: 7, tds: 200, turbidity: 2 },
                                { name: "Sholinganallur", lat: 12.8996, lng: 80.2279, ph: 7, tds: 200, turbidity: 2 },
                                { name: "water tank-1", lat: 12.1278, lng: 79.6168, ph: 7, tds: 200, turbidity: 2 },
                                { name: "watertank-2", lat: 12.1361, lng: 79.6228, ph: 7, tds: 200, turbidity: 2 },
                                { name: "watertank-3", lat: 12.1244, lng: 79.6253, ph: 7, tds: 200, turbidity: 2 },
                                { name: "watertank-4", lat: 12.1235, lng: 79.6174, ph: 7, tds: 200, turbidity: 2 },
                                { name: "watertank-5", lat: 12.1285, lng: 79.6221, ph: 7, tds: 200, turbidity: 2 },
                                { name: "watertank-6", lat: userLat, lng: userLng, ph: 7, tds: 200, turbidity: 2 },

                                { name: "water tank", lat: 12.125260907071581, lng: 79.62002878817887, ph: 7, tds: 200, turbidity: 2 },
                                { name: "water tank", lat: 12.12572013225513, lng: 79.63266535082364, ph: 7, tds: 200, turbidity: 2 },

                                { name: "water tank", lat: 12.127275274817352, lng: 79.63550554698574, ph: 7, tds: 200, turbidity: 2 },

                                { name: "water tank", lat: 12.113094603354194, lng: 79.63758509588703, ph: 7, tds: 200, turbidity: 2 },

                                { name: "water tank", lat: 12.101211766421127, lng: 79.63495586333882, ph: 7, tds: 200, turbidity: 2 },

                                { name: "water tank", lat: 12.095570463355546, lng: 79.64594000444983, ph: 7, tds: 200, turbidity: 2 },

                                { name: "water tank", lat: 12.07181861444622, lng: 79.65206030581354, ph: 7, tds: 200, turbidity: 2 },

                                { name: "water tank", lat: 12.086704292021807, lng: 79.63627537625982, ph: 7, tds: 200, turbidity: 2 },

                                { name: "water tank", lat: 12.091362254336262, lng: 79.6260615240067, ph: 7, tds: 200, turbidity: 2 },

                                {
                                    "name": "Kaveri River",
                                    "type": "River",
                                    "lat": 13.08,
                                    "lng": 80.27,
                                    "ph": 7.2,
                                    "tds": 350,
                                    "turbidity": 5,
                                    "description": "The water quality is moderately clean with a near-neutral pH. TDS is within safe limits, and turbidity is low, making it suitable for domestic use after basic treatment."
                                },
                                {
                                    "name": "Palar River",
                                    "type": "River",
                                    "lat": 12.90,
                                    "lng": 79.20,
                                    "ph": 7.5,
                                    "tds": 900,
                                    "turbidity": 12,
                                    "description": "This river shows high TDS indicating hard water. Turbidity is moderate, and the water may have a salty taste. It is not suitable for drinking without purification."
                                },
                                {
                                    "name": "Puzhal Lake",
                                    "type": "Lake",
                                    "lat": 13.18,
                                    "lng": 80.18,
                                    "ph": 7.0,
                                    "tds": 500,
                                    "turbidity": 8,
                                    "description": "The lake water has balanced pH and borderline TDS levels. It is usable after treatment and is commonly used for water supply purposes."
                                },
                                {
                                    "name": "Ambattur Lake",
                                    "type": "Lake",
                                    "lat": 13.11,
                                    "lng": 80.16,
                                    "ph": 7.8,
                                    "tds": 1100,
                                    "turbidity": 20,
                                    "description": "This lake shows high TDS and turbidity, indicating pollution. The water is not suitable for drinking and requires advanced purification."
                                },
                                {
                                    "name": "Village Pond",
                                    "type": "Pond",
                                    "lat": 11.50,
                                    "lng": 78.50,
                                    "ph": 6.8,
                                    "tds": 700,
                                    "turbidity": 25,
                                    "description": "The pond water quality is poor with high turbidity and elevated TDS. It may contain contaminants and is unsafe for direct consumption."
                                },
                                {
                                    "name": "Irrigation Tank",
                                    "type": "Tank",
                                    "lat": 10.90,
                                    "lng": 79.80,
                                    "ph": 7.1,
                                    "tds": 600,
                                    "turbidity": 15,
                                    "description": "The tank water has moderate hardness and turbidity. It can be used for irrigation but requires treatment for drinking purposes."
                                }

                            ]
                        },
                        "Maharashtra": {
                            "Mumbai City": {

                            },
                            "Pune": {

                            }
                        }
                    }
                },
                "North America": {
                    "United States": {
                        "California": {
                            "Los Angeles County": {

                            },
                            "San Francisco": {

                            }
                        },
                        "New York": {
                            "New York City": {

                            }
                        }
                    }
                },
                "Europe": {
                    "United Kingdom": {
                        "England": {
                            "Greater London": {

                            },
                            "Greater Manchester": {

                            }
                        }
                    }
                }
            }
            var contitent = Object.keys(tank);
            function btnAll() {
                document.getElementById("all").style.backgroundColor = "rgba(31, 199, 31, 0.35)";

                document.getElementById("unsafe").style.backgroundColor = "rgba(225, 225, 255, 0.35)";

                document.getElementById("moderate").style.backgroundColor = "rgba(225, 225, 255, 0.35)";

                document.getElementById("safe").style.backgroundColor = "rgba(225, 225, 255, 0.35)";

                tankMarker.forEach(marker => map.removeLayer(marker));
                tankMarker = [];
                nearby = [];

                contitent.forEach(cont => {
                    Object.values(tank[cont]).forEach(country => {
                        Object.values(country).forEach(state => {
                            Object.values(state).forEach(district => {

                                if (Array.isArray(district)) {
                                    district.forEach(t => {

                                        let result = predict(t.ph, t.tds, t.turbidity);
                                        let desc = t.description || "No description available for this location.";

                                        let marker = L.marker([t.lat, t.lng], {
                                            icon: getIcon(result)
                                        }).addTo(map)
                                            .bindPopup(`<b>${t.name}</b><br>
  Quality: ${result}<br>
  <button class="det" data-desc="${desc}" onclick="detail(this.getAttribute('data-desc'))">Details</button>`);

                                        tankMarker.push(marker);
                                        if (userLat !== "" && userLng !== "") {
                                            let d = distance(userLat, userLng, t.lat, t.lng);
                                            if (d < 20) {
                                                nearby.push(marker);
                                            }

                                        } else {
                                        }

                                    });
                                }

                            });
                        });
                    });
                });
            }
            function btnSafe() {
                this.style.backgroundColor = "rgba(31, 199, 31, 0.35)";

                document.getElementById("unsafe").style.backgroundColor = "rgba(225, 225, 255, 0.35)";

                document.getElementById("moderate").style.backgroundColor = "rgba(225, 225, 255, 0.35)";

                document.getElementById("all").style.backgroundColor = "rgba(225, 225, 255, 0.35)";
                tankMarker.forEach(marker => map.removeLayer(marker));
                tankMarker = [];
                nearby = [];

                contitent.forEach(cont => {
                    Object.values(tank[cont]).forEach(country => {
                        Object.values(country).forEach(state => {
                            Object.values(state).forEach(district => {

                                if (Array.isArray(district)) {
                                    district.forEach(tank => {


                                        let result = predict(tank.ph, tank.tds, tank.turbidity);
                                        let desc = tank.description || "No description available for this location.";

                                        if (result === "Safe") {
                                            let marker = L.marker([tank.lat, tank.lng], {
                                                icon: getIcon(result)
                                            }).addTo(map)
                                                .bindPopup(`<b>${tank.name}</b><br>
      Quality: ${result}<br>
      <button class="det" data-desc="${desc}" onclick="detail(this.getAttribute('data-desc'))">Details</button>`);
                                            tankMarker.push(marker);
                                            if (userLat !== "" && userLng !== "") {
                                                let d = distance(userLat, userLng, tank.lat, tank.lng);
                                                if (d < 20) {
                                                    nearby.push(marker);
                                                }
                                            }
                                        }
                                    });
                                }

                            });
                        });
                    });
                });
            }
            function btnUnsafe() {
                this.style.backgroundColor = "rgba(31, 199, 31, 0.35)";

                document.getElementById("safe").style.backgroundColor = "rgba(225, 225, 255, 0.35)";

                document.getElementById("moderate").style.backgroundColor = "rgba(225, 225, 255, 0.35)";

                document.getElementById("all").style.backgroundColor = "rgba(225, 225, 255, 0.35)";
                tankMarker.forEach(marker => map.removeLayer(marker));
                tankMarker = [];
                nearby = [];

                contitent.forEach(cont => {
                    Object.values(tank[cont]).forEach(country => {
                        Object.values(country).forEach(state => {
                            Object.values(state).forEach(district => {

                                if (Array.isArray(district)) {
                                    district.forEach(tank => {

                                        let result = predict(tank.ph, tank.tds, tank.turbidity);
                                        let desc = tank.description || "No description available for this location.";

                                        if (result === "Unsafe") {
                                            let marker = L.marker([tank.lat, tank.lng], {
                                                icon: getIcon(result)
                                            }).addTo(map)
                                                .bindPopup(`<b>${tank.name}</b><br>
      Quality: ${result}<br>
      <button class="det" data-desc="${desc}" onclick="detail(this.getAttribute('data-desc'))">Details</button>`);
                                            tankMarker.push(marker);
                                            if (userLat !== "" && userLng !== "") {
                                                let d = distance(userLat, userLng, tank.lat, tank.lng);
                                                if (d < 20) {
                                                    nearby.push(marker);
                                                }
                                            }
                                        }


                                    });
                                }

                            });
                        });
                    });
                });
            }
            function btnModerate() {
                this.style.backgroundColor = "rgba(31, 199, 31, 0.35)";

                document.getElementById("unsafe").style.backgroundColor = "rgba(225, 225, 255, 0.35)";

                document.getElementById("safe").style.backgroundColor = "rgba(225, 225, 255, 0.35)";

                document.getElementById("all").style.backgroundColor = "rgba(225, 225, 255, 0.35)";
                tankMarker.forEach(marker => map.removeLayer(marker));
                tankMarker = [];
                nearby = [];

                contitent.forEach(cont => {
                    Object.values(tank[cont]).forEach(country => {
                        Object.values(country).forEach(state => {
                            Object.values(state).forEach(district => {

                                if (Array.isArray(district)) {
                                    district.forEach(tank => {

                                        let result = predict(tank.ph, tank.tds, tank.turbidity);
                                        let desc = tank.description || "No description available for this location.";

                                        if (result === "Moderate") { 
                                            let marker = L.marker([tank.lat, tank.lng], {
                                                icon: getIcon(result)
                                            }).addTo(map)
                                                .bindPopup(`<b>${tank.name}</b><br>
      Quality: ${result}<br>
      <button class="det" data-desc="${desc}" onclick="detail(this.getAttribute('data-desc'))">Details</button>`);
                                            tankMarker.push(marker);
                                            if (userLat !== "" && userLng !== "") {
                                                let d = distance(userLat, userLng, tank.lat, tank.lng);
                                                if (d < 20) {
                                                    nearby.push(marker);
                                                }
                                            }
                                        }


                                    });
                                }

                            });
                        });
                    });
                });
            }
            function close() {

                document.getElementById("details").style.display = "none";
            }
            function detail(det) {
                const mapd = document.getElementById("map");
                mapd.style.width = "100%";

                const details = document.getElementById("details");
                details.style.backgroundColor = "rgba(255, 255, 255, 0.75)";
                details.style.position = "absolute";
                details.style.top = "0";
                details.style.right = "0";
                details.style.width = "500px";
                details.style.height = "100vh";
                details.style.padding = "20px";
                details.style.boxSizing = "border-box";
                details.style.zIndex = "9999";
                details.style.fontFamily = "Arial, sans-serif";
                details.style.boxShadow = "-2px 0 5px rgba(0,0,0,0.3)";
                details.style.display = "block";

                details.innerHTML = `
        <button id="close-btn" style="cursor:pointer; color:red; padding: 5px; margin-bottom: 10px;">Close X</button>
        <h3>Water Details</h3>
        <p>${det}</p> 
    `;
            }

            document.getElementById("find").addEventListener("click", processLocation);
            document.getElementById("all").addEventListener("click", btnAll);
            document.getElementById("unsafe").addEventListener("click", btnUnsafe);
            document.getElementById("safe").addEventListener("click", btnSafe);
            document.getElementById("moderate").addEventListener("click", btnModerate);
            document.addEventListener("click", function (e) {

                if (e.target && e.target.id === "close-btn") {
                    close();
                }
            });
        } else {
            alert("Unauthorized access");
            window.location.href = "home.html";
        }



    </script>
</body>

</html>
