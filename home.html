            justify-content: center;
            align-items: center;

        div {

            left: 50%;

            height: 300px;
            transform: translate(-50%, -50%);

            align-items: center;


            align-content: center;
            background-color: rgba(255, 255, 255, 0.05);

                0 0 10px white,
                0 0 10px white;

        }

            backdrop-filter: blur(10px);

            color: white;
            border: none;

            font-size: 16px;
            cursor: pointer;
        }

            box-shadow: 0 0 10px rgb(19, 190, 206),
